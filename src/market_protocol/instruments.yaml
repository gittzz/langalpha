# Seed registry: per-instrument overrides applied on top of the suffix/MIC
# heuristic in symbology.py. Keys are legacy spellings (bare US tickers or
# suffixed foreign tickers), uppercased on load. Supported override fields:
# mic, name, currency, price_currency, display_unit, calendar_id.
#
# Bare US tickers default to XNYS (calendar-equivalent to XNAS); pin known
# Nasdaq listings here so their instrument keys carry the true listing MIC.
instruments:
  AAPL:
    mic: XNAS
    name: Apple Inc.
  MSFT:
    mic: XNAS
    name: Microsoft Corporation
  GOOGL:
    mic: XNAS
    name: Alphabet Inc.
  AMZN:
